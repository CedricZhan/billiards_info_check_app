<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>斯诺克比赛查询</title>

  <style>
    /* 强制亮色（无视浏览器暗色） */
    html, body {
      background: #f8fafc !important;
      color: #0f172a !important;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }

    .container {
      max-width: 1280px;
      margin: 40px auto;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0;
      font-size: 34px;
    }

    .subtitle {
      color: #64748b;
      margin: 10px 0 24px;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      align-items: center;
    }

    input {
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      border: 1px solid #e2e8f0;
      flex: 1;
      min-width: 260px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
    }

    /* 模式按钮 */
    .mode-btn {
      background: #e2e8f0;
      color: #0f172a;
    }

    .mode-btn.active {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    .search-btn {
      background: #2563eb;
      color: white;
    }

    .search-btn:hover {
      transform: translateY(-1px);
    }

    .summary {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat {
      background: #e0f2fe;
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 12px;
      overflow: hidden;
    }

    th {
      background: #f1f5f9;
      padding: 14px;
      text-align: left;
    }

    td {
      padding: 14px;
      border-bottom: 1px solid #e2e8f0;
    }

    tr:hover {
      background: #f8fafc;
    }

    .players {
      font-weight: bold;
      color: #0369a1;
    }

    .score {
      font-weight: bold;
      color: #ca8a04;
    }

    .winner {
      font-weight: bold;
      color: #16a34a;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
    }

    .finished { background: #dcfce7; color: #166534; }
    .upcoming { background: #dbeafe; color: #1e40af; }
    .unknown { background: #fef3c7; color: #92400e; }

    .empty {
      text-align: center;
      color: #94a3b8;
      padding: 30px;
    }

  </style>
</head>

<body>
<div class="container">
  <div class="card">
    <h1>斯诺克比赛查询</h1>
    <div class="subtitle">历史比赛 & 未来比赛</div>

    <div class="controls">
      <button class="mode-btn active" id="historyBtn" onclick="setMode('history')">历史赛事</button>
      <button class="mode-btn" id="upcomingBtn" onclick="setMode('upcoming')">未来赛事</button>

      <input id="search" placeholder="搜索球员 / 赛事">
      <button class="search-btn" onclick="load()">查询</button>
    </div>

    <div class="summary">
      <div class="stat" id="total">总数：0</div>
      <div class="stat" id="modeText">当前：历史比赛</div>
    </div>

    <table>
      <thead id="tableHead"></thead>
      <tbody id="data">
        <tr><td class="empty">加载中...</td></tr>
      </tbody>
    </table>

  </div>
</div>

<script>
  let currentMode = "history";

  function setMode(mode) {
    currentMode = mode;

    document.getElementById("historyBtn").classList.toggle("active", mode === "history");
    document.getElementById("upcomingBtn").classList.toggle("active", mode === "upcoming");

    load();
  }

  function renderHeader(isHistory) {
    document.getElementById("tableHead").innerHTML = isHistory
      ? `<tr>
          <th>日期</th>
          <th>赛事</th>
          <th>球员</th>
          <th>比分</th>
          <th>胜者</th>
          <th>状态</th>
        </tr>`
      : `<tr>
          <th>日期</th>
          <th>赛事</th>
          <th>球员</th>
          <th>比分</th>
          <th>状态</th>
        </tr>`;
  }

  async function load() {
    const isHistory = currentMode === "history";
    const keyword = document.getElementById("search").value.toLowerCase();

    renderHeader(isHistory);

    const res = await fetch("/api/matches?mode=" + currentMode);
    const data = await res.json();

    let html = "";
    let count = 0;

    for (let m of data) {
      const text = `${m.date} ${m.event} ${m.player1} ${m.player2}`.toLowerCase();
      if (keyword && !text.includes(keyword)) continue;

      count++;

      const players = `${m.player1} vs ${m.player2}`;

      if (isHistory) {
        html += `<tr>
          <td>${m.date}</td>
          <td>${m.event}</td>
          <td class="players">${players}</td>
          <td class="score">${m.score}</td>
          <td class="winner">${m.winner}</td>
          <td><span class="badge finished">${m.status}</span></td>
        </tr>`;
      } else {
        html += `<tr>
          <td>${m.date}</td>
          <td>${m.event}</td>
          <td class="players">${players}</td>
          <td class="score">${m.score}</td>
          <td><span class="badge upcoming">${m.status}</span></td>
        </tr>`;
      }
    }

    if (!html) html = `<tr><td class="empty">没有找到比赛</td></tr>`;

    document.getElementById("data").innerHTML = html;
    document.getElementById("total").innerText = "总数：" + count;
    document.getElementById("modeText").innerText = "当前：" + (isHistory ? "历史比赛" : "未来比赛");
  }

  load();
</script>
</body>
</html>
